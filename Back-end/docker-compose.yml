services:
  db:
    image: mysql:8.0
    container_name: desafioMuralis-mysql
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: desafio_muralis
      MYSQL_USER: desafio
      MYSQL_PASSWORD: desafio123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: desafioMuralis-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/desafio_muralis?useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: desafio
      SPRING_DATASOURCE_PASSWORD: desafio123
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: