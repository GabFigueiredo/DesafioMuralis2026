name: CI - Testes Unitários e E2E

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  testes-unitarios:
    name: Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes unitários
        working-directory: Back-end
        run: mvn test -Dtest="**/unit/**" -DfailIfNoTests=false

      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-unitarios
          path: Back-end/target/surefire-reports/

  testes-e2e:
    name: Testes E2E
    runs-on: ubuntu-latest
    needs: testes-unitarios

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes E2E
        working-directory: Back-end
        run: mvn test -Dtest="**/e2e/**" -DfailIfNoTests=false

      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-e2e
          path: Back-end/target/surefire-reports/